repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: bash-syntax
        name: bash syntax check
        language: system
        entry: bash -n
        files: \.sh$
        # Intentional-error fixtures live here and must not be syntax-checked.
        exclude: ^tests/blueprint/fixtures/shell_behavioral_check/
      - id: quality-docs-lint
        name: quality docs lint (markdown targets and links)
        language: system
        entry: make quality-docs-lint
        pass_filenames: false
        always_run: true
      - id: quality-test-pyramid
        name: quality test-pyramid classification check
        language: system
        entry: python3 scripts/bin/quality/check_test_pyramid.py
        pass_filenames: false
        # Trigger whenever a test file is staged so unclassified test_*.py files
        # are caught at commit time rather than only at pre-push or in CI.
        files: ^tests/.*\.py$
        always_run: false
      - id: quality-validate-branch
        name: quality validate branch naming (pre-push)
        language: system
        entry: python3 scripts/bin/blueprint/validate_contract.py --branch-only
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: quality-docs-check-changed-pre-push
        name: quality docs check changed scope (pre-push)
        language: system
        entry: make quality-docs-check-changed
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: infra-audit-version-cached
        name: infra audit version cached (pre-push)
        language: system
        entry: make infra-audit-version-cached
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: apps-audit-versions-cached
        name: apps audit versions cached (pre-push)
        language: system
        entry: make apps-audit-versions-cached
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: pnpm-lockfile-sync
        name: pnpm lockfile sync (pre-push)
        language: system
        entry: pnpm install --frozen-lockfile --prefer-offline
        pass_filenames: false
        stages: [pre-push]
        files: (^|/)package\.json$
      - id: quality-consumer-pre-push
        name: consumer pre-push quality gate
        language: system
        entry: make quality-consumer-pre-push
        pass_filenames: false
        stages: [pre-push]
        always_run: true
