name: Prepare Blueprint CI
description: Setup shared tooling and bootstrap the blueprint baseline for CI jobs.

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: "22"

    - name: Enable pnpm
      shell: bash
      run: |
        corepack enable
        pnpm --version

    - name: Ensure CI CLI prerequisites
      shell: bash
      run: |
        PREREQS_AUTO_INSTALL=true \
        PREREQS_INSTALL_OPTIONAL=false \
        PREREQS_REQUIRE_STACKIT_TOOLS=false \
        make infra-prereqs

    - name: Bootstrap blueprint and infra baseline
      shell: bash
      run: |
        make blueprint-bootstrap
        make infra-bootstrap

    - name: Bootstrap project dependencies for clean runners
      shell: bash
      run: |
        BLUEPRINT_PROFILE=local-lite OBSERVABILITY_ENABLED=false make apps-ci-bootstrap
