name: template-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          pnpm --version

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate release baseline
        run: |
          make quality-hooks-run
          make infra-smoke

      - name: Run template smoke
        run: |
          BLUEPRINT_REPO_NAME=release-smoke-blueprint \
          BLUEPRINT_GITHUB_ORG=release-smoke-org \
          BLUEPRINT_GITHUB_REPO=release-smoke-blueprint \
          BLUEPRINT_DEFAULT_BRANCH=main \
          make blueprint-template-smoke

      - name: Generate release notes
        run: |
          make blueprint-release-notes

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/releases/template_release_notes.md
