name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  blueprint-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python test deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pre-commit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          pnpm --version

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bootstrap blueprint and infra baseline
        run: |
          make blueprint-bootstrap
          make infra-bootstrap

      - name: Run canonical quality gate
        run: |
          make quality-hooks-run

      - name: Run pre-push hook stage
        run: |
          pre-commit run --hook-stage pre-push --all-files

      - name: Smoke blueprint-migrate end-to-end
        run: |
          python3 -m unittest \
            tests.blueprint.test_upgrade.BlueprintUpgradeTests.test_blueprint_migrate_make_target_smoke_in_template_copy

      - name: Validate app baseline
        run: |
          BLUEPRINT_PROFILE=local-lite OBSERVABILITY_ENABLED=false make apps-bootstrap
          BLUEPRINT_PROFILE=local-lite OBSERVABILITY_ENABLED=false make apps-smoke

      - name: Build and smoke docs
        run: |
          make docs-install
          make docs-build
          make docs-smoke

      - name: Run canonical test lanes
        run: |
          make test-unit-all
          make test-integration-all
          make test-contracts-all
          make test-e2e-all-local

      - name: Run tooling tests
        run: pytest -q tests

  contract-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [local-full, stackit-dev]
        observability_enabled: ["false", "true"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate contract-critical profile/flag matrix
        run: |
          export BLUEPRINT_PROFILE=${{ matrix.profile }}
          export OBSERVABILITY_ENABLED=${{ matrix.observability_enabled }}
          export WORKFLOWS_ENABLED=false
          export LANGFUSE_ENABLED=false
          export POSTGRES_ENABLED=false
          export NEO4J_ENABLED=false
          make blueprint-bootstrap
          make infra-bootstrap
          make apps-bootstrap
          make infra-validate
          make infra-smoke

  consumer-golden-conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Golden template-consumer conformance
        run: |
          BLUEPRINT_REPO_NAME=ci-smoke-blueprint \
          BLUEPRINT_GITHUB_ORG=ci-smoke-org \
          BLUEPRINT_GITHUB_REPO=ci-smoke-blueprint \
          BLUEPRINT_DEFAULT_BRANCH=main \
          make blueprint-template-smoke
