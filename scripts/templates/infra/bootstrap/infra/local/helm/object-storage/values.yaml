fullnameOverride: "{{OBJECT_STORAGE_HELM_RELEASE}}"
global:
  security:
    # The blueprint pins mirrored public ECR images because the equivalent
    # Docker Hub tags can disappear after upstream chart releases.
    allowInsecureImages: true
mode: standalone
auth:
  existingSecret: "{{OBJECT_STORAGE_CREDENTIAL_SECRET_NAME}}"
defaultBuckets: "{{OBJECT_STORAGE_BUCKET_NAME}}"
image:
  registry: "{{OBJECT_STORAGE_IMAGE_REGISTRY}}"
  repository: "{{OBJECT_STORAGE_IMAGE_REPOSITORY}}"
  tag: "{{OBJECT_STORAGE_IMAGE_TAG}}"
clientImage:
  registry: "{{OBJECT_STORAGE_CLIENT_IMAGE_REGISTRY}}"
  repository: "{{OBJECT_STORAGE_CLIENT_IMAGE_REPOSITORY}}"
  tag: "{{OBJECT_STORAGE_CLIENT_IMAGE_TAG}}"
console:
  enabled: false
