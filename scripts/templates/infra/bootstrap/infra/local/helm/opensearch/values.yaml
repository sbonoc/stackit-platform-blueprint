fullnameOverride: "{{OPENSEARCH_HELM_RELEASE}}"
image:
  registry: "{{OPENSEARCH_IMAGE_REGISTRY}}"
  repository: "{{OPENSEARCH_IMAGE_REPOSITORY}}"
  tag: "{{OPENSEARCH_IMAGE_TAG}}"
security:
  enabled: true
  existingSecret: "{{OPENSEARCH_PASSWORD_SECRET_NAME}}"
master:
  masterOnly: false
  replicaCount: 1
  heapSize: 512m
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    enabled: false
data:
  replicaCount: 0
ingest:
  enabled: false
coordinating:
  replicaCount: 1
  heapSize: 256m
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 256Mi
dashboards:
  enabled: false
