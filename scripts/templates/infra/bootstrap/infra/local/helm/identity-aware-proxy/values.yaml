config:
  existingSecret: "{{IAP_CONFIG_SECRET_NAME}}"
  provider: oidc
  oidcIssuerURL: "{{KEYCLOAK_ISSUER_URL}}"
  emailDomains:
    - "*"
  upstreams:
    - "{{IAP_UPSTREAM_URL}}"
extraArgs:
  redirect-url: "{{IAP_REDIRECT_URL}}"
  email-domain: "*"
ingress:
  enabled: true
  className: "{{PUBLIC_ENDPOINTS_INGRESS_CLASS}}"
  path: /
  hosts:
    - "{{IAP_PUBLIC_HOST}}"
