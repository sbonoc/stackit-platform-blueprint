apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime-credentials-source-reader
  namespace: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runtime-credentials-source-reader
  namespace: security
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - runtime-credentials-source
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtime-credentials-source-reader
  namespace: security
subjects:
  - kind: ServiceAccount
    name: runtime-credentials-source-reader
    namespace: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runtime-credentials-source-reader
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: runtime-credentials-source-store
spec:
  provider:
    kubernetes:
      remoteNamespace: security
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: security
      auth:
        serviceAccount:
          name: runtime-credentials-source-reader
          namespace: security
