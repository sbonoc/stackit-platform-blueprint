apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-prod
  namespace: argocd
spec:
  description: Platform workloads for prod environment.
  sourceRepos:
    - https://github.com/example-org/example-repo.git
    - https://charts.bitnami.com/bitnami
    - https://oauth2-proxy.github.io/manifests
    - https://open-telemetry.github.io/opentelemetry-helm-charts
    - https://langfuse.github.io/langfuse-k8s
    - https://helm.neo4j.com/neo4j
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: apps
      server: https://kubernetes.default.svc
    - namespace: data
      server: https://kubernetes.default.svc
    - namespace: messaging
      server: https://kubernetes.default.svc
    - namespace: security
      server: https://kubernetes.default.svc
    - namespace: observability
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: external-secrets.io
      kind: ClusterSecretStore
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: argoproj.io
      kind: Application
    - group: external-secrets.io
      kind: ExternalSecret
    - group: networking.k8s.io
      kind: Ingress
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
