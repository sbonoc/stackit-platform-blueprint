      - blueprint/repo.init.secrets.example.env
      - blueprint/runtime_identity_contract.yaml
      - docs/docusaurus.config.js
      - docs/README.md
      - docs/blueprint/README.md
      - docs/blueprint/architecture/system_overview.md
      - docs/blueprint/architecture/execution_model.md
      - docs/blueprint/governance/ownership_matrix.md
      - docs/reference/generated/contract_metadata.generated.md
      - docs/reference/generated/core_targets.generated.md
      - docs/platform/README.md
      - docs/platform/consumer/first_30_minutes.md
      - docs/platform/consumer/quickstart.md
      - docs/platform/consumer/endpoint_exposure_model.md
      - docs/platform/consumer/protected_api_routes.md
      - docs/platform/consumer/runtime_credentials_eso.md
      - docs/platform/consumer/troubleshooting.md
      - docs/platform/modules/observability/README.md
      - docs/platform/modules/workflows/README.md
      - docs/platform/modules/langfuse/README.md
      - docs/platform/modules/postgres/README.md
      - docs/platform/modules/neo4j/README.md
      - docs/platform/modules/object-storage/README.md
      - docs/platform/modules/rabbitmq/README.md
      - docs/platform/modules/dns/README.md
      - docs/platform/modules/public-endpoints/README.md
      - docs/platform/modules/secrets-manager/README.md
      - docs/platform/modules/kms/README.md
      - docs/platform/modules/identity-aware-proxy/README.md
      - tests/__init__.py
      - tests/infra/__init__.py
      - tests/e2e/__init__.py
      - tests/_shared/__init__.py
      - tests/_shared/helpers.py
      - tests/_shared/json_schema.py
    ownership_path_classes:
      source_only:
        - tests/blueprint
        - tests/docs
      consumer_seeded:
        - README.md
        - AGENTS.md
        - AGENTS.backlog.md
        - AGENTS.decisions.md
        - docs/README.md
        - .github/CODEOWNERS
        - .github/ISSUE_TEMPLATE/bug_report.yml
        - .github/ISSUE_TEMPLATE/feature_request.yml
        - .github/ISSUE_TEMPLATE/config.yml
        - .github/pull_request_template.md
        - .github/workflows/ci.yml
      init_managed:
        - blueprint/repo.init.env
        - blueprint/repo.init.secrets.example.env
        - blueprint/contract.yaml
        - docs/docusaurus.config.js
        - infra/gitops/argocd/root/applicationset-platform-environments.yaml
        - infra/gitops/argocd/environments/dev/platform-application.yaml
        - infra/gitops/argocd/environments/stage/platform-application.yaml
        - infra/gitops/argocd/environments/prod/platform-application.yaml
        - infra/gitops/argocd/overlays/local/appproject.yaml
        - infra/gitops/argocd/overlays/local/application-platform-local.yaml
        - infra/gitops/argocd/overlays/dev/appproject.yaml
        - infra/gitops/argocd/overlays/dev/applicationset-platform-environments.yaml
        - infra/gitops/argocd/overlays/stage/appproject.yaml
        - infra/gitops/argocd/overlays/stage/applicationset-platform-environments.yaml
        - infra/gitops/argocd/overlays/prod/appproject.yaml
        - infra/gitops/argocd/overlays/prod/applicationset-platform-environments.yaml
        - infra/cloud/stackit/terraform/bootstrap/env/dev.tfvars
        - infra/cloud/stackit/terraform/bootstrap/env/stage.tfvars
        - infra/cloud/stackit/terraform/bootstrap/env/prod.tfvars
        - infra/cloud/stackit/terraform/foundation/env/dev.tfvars
        - infra/cloud/stackit/terraform/foundation/env/stage.tfvars
        - infra/cloud/stackit/terraform/foundation/env/prod.tfvars
        - infra/cloud/stackit/terraform/bootstrap/state-backend/dev.hcl
        - infra/cloud/stackit/terraform/bootstrap/state-backend/stage.hcl
        - infra/cloud/stackit/terraform/bootstrap/state-backend/prod.hcl
        - infra/cloud/stackit/terraform/foundation/state-backend/dev.hcl
        - infra/cloud/stackit/terraform/foundation/state-backend/stage.hcl
        - infra/cloud/stackit/terraform/foundation/state-backend/prod.hcl
      conditional_scaffold:
        - dags/
        - infra/cloud/stackit/terraform/modules/workflows
        - infra/gitops/argocd/optional/${ENV}/workflows.yaml
        - tests/infra/modules/workflows
        - infra/cloud/stackit/terraform/modules/langfuse
        - infra/gitops/argocd/optional/${ENV}/langfuse.yaml
        - tests/infra/modules/langfuse
        - infra/cloud/stackit/terraform/modules/postgres
        - infra/local/helm/postgres/values.yaml
        - tests/infra/modules/postgres
        - infra/cloud/stackit/terraform/modules/neo4j
        - infra/local/helm/neo4j/values.yaml
        - infra/gitops/argocd/optional/${ENV}/neo4j.yaml
        - tests/infra/modules/neo4j
        - infra/cloud/stackit/terraform/modules/object-storage
        - infra/local/helm/object-storage/values.yaml
        - tests/infra/modules/object-storage
        - infra/cloud/stackit/terraform/modules/rabbitmq
        - infra/local/helm/rabbitmq/values.yaml
        - tests/infra/modules/rabbitmq
        - infra/cloud/stackit/terraform/modules/dns
        - tests/infra/modules/dns
        - infra/cloud/stackit/terraform/modules/public-endpoints
        - infra/local/helm/public-endpoints/values.yaml
        - infra/gitops/argocd/optional/${ENV}/public-endpoints.yaml
        - tests/infra/modules/public-endpoints
        - infra/cloud/stackit/terraform/modules/secrets-manager
        - tests/infra/modules/secrets-manager
        - infra/cloud/stackit/terraform/modules/kms
        - tests/infra/modules/kms
        - infra/cloud/stackit/terraform/modules/identity-aware-proxy
        - infra/local/helm/identity-aware-proxy/values.yaml
        - infra/gitops/argocd/optional/${ENV}/identity-aware-proxy.yaml
        - tests/infra/modules/identity-aware-proxy
    consumer_init:
      template_root: scripts/templates/consumer/init
      mode_from: template-source
      mode_to: generated-consumer
      prune_disabled_optional_scaffolding: true

  governance:
    canonical_policy_source: AGENTS.md
    no_aliases_or_shims:
      aliases_forbidden: true
      backward_compatibility_shims_forbidden: true
      canonical_variable_per_concern: true
      canonical_target_per_concern: true
    decision_traceability_required: true
    backlog_update_required_on_scope_change: true

  structure:
    required_paths:
      - scripts/bin/
      - scripts/lib/
      - scripts/bin/platform/
      - scripts/lib/platform/
      - infra/cloud/stackit/terraform/
      - infra/cloud/stackit/terraform/bootstrap/
      - infra/cloud/stackit/terraform/foundation/
      - infra/local/crossplane/
      - infra/local/helm/
      - infra/gitops/argocd/
      - infra/gitops/argocd/root/
      - infra/gitops/argocd/environments/
      - infra/gitops/platform/
      - infra/gitops/platform/base/
      - infra/gitops/platform/environments/
      - make/
      - make/platform/
      - apps/
      - tests/
      - tests/infra/
      - tests/e2e/
      - tests/_shared/
      - docs/
      - docs/blueprint/
      - docs/platform/
      - blueprint/modules/
    canonical_entrypoints:
      makefile: Makefile
      blueprint_makefile: make/blueprint.generated.mk
      platform_makefile: make/platform.mk
      scripts_bin_root: scripts/bin
      scripts_lib_root: scripts/lib
      platform_scripts_bin_root: scripts/bin/platform
      platform_scripts_lib_root: scripts/lib/platform
      terraform_root: infra/cloud/stackit/terraform
      crossplane_root: infra/local/crossplane
      local_helm_root: infra/local/helm
      argocd_root: infra/gitops/argocd
      dags_root: dags
  script_contract:
    blueprint_managed_roots:
      - scripts/bin/blueprint/
      - scripts/bin/docs/
      - scripts/lib/blueprint/
      - scripts/lib/docs/
      - scripts/lib/infra/
      - scripts/lib/quality/
      - scripts/lib/shell/
      - scripts/bin/infra/
      - scripts/bin/quality/
    platform_editable_roots:
      - scripts/bin/platform/
      - scripts/lib/platform/

  profiles:
    default: local-full
    supported:
      - local-full
      - local-lite
      - stackit-dev
      - stackit-stage
      - stackit-prod
    profile_contract:
      local-full:
        description: "Local Kubernetes stack with Docker Desktop preferred on workstations and optional modules available."
      local-lite:
        description: "Local Kubernetes stack with Docker Desktop preferred on workstations and lighter defaults."
      stackit-dev:
        description: "Managed STACKIT deployment for dev."
      stackit-stage:
        description: "Managed STACKIT deployment for stage."
      stackit-prod:
        description: "Managed STACKIT deployment for prod."

  architecture:
    ddd_clean_architecture_required: true
    logical_boundaries:
      - domain
      - application
      - infrastructure
      - presentation
    dependency_rule: "Outer layers may depend on inner; inner layers never depend on outer."
    airflow_dag_layout:
      dag_entrypoints_root: dags/
      shared_bootstrap_file: dags/_bootstrap.py
      forbid_dag_entrypoints_under: apps/**
      airflowignore_must_restrict_parser_scope: true

  stack_contract:
    local:
      kubernetes: docker-desktop-preferred
      kubernetes_override_env: LOCAL_KUBE_CONTEXT
      ci_kubernetes: kind
      provisioning: crossplane
      deployment: argocd
      secrets: external-secrets-operator
      observability:
        optional_module_id: observability
        default_enabled: false
        allowed_installers:
          - helm
          - crossplane-provider-helm
    stackit:
      provisioning: terraform
      deployment: argocd
      secrets: stackit-secrets-manager-plus-eso
      authn_authz: keycloak
      observability:
        optional_module_id: observability
        default_enabled: false
        managed_service: stackit-observability

  toggles:
    OBSERVABILITY_ENABLED:
      type: boolean
      default: false
      required: true
      description: "Canonical optional-module switch for observability stack and OTEL runtime wiring."
    WORKFLOWS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for STACKIT Workflows (Managed Airflow) provisioning/deployment."
    LANGFUSE_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Langfuse provisioning/deployment."
    POSTGRES_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Postgres provisioning/deployment."
    NEO4J_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Neo4j provisioning/deployment."
    OBJECT_STORAGE_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Object Storage provisioning/deployment."
    RABBITMQ_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for RabbitMQ provisioning/deployment."
    DNS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for DNS provisioning/deployment."
    PUBLIC_ENDPOINTS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Gateway API public edge provisioning/deployment."
    SECRETS_MANAGER_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Secrets Manager provisioning/deployment."
    KMS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for KMS provisioning/deployment."
    IDENTITY_AWARE_PROXY_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Identity-Aware Proxy provisioning/deployment; requires Keycloak OIDC configuration."
    KEYCLOAK_OPTIONAL_MODULE_RECONCILIATION_ENABLED:
      type: boolean
      default: true
      required: false
      description: "Feature toggle for optional-module Keycloak realm/client/admin reconciliation (for example Workflows/Langfuse)."
    RUNTIME_CREDENTIALS_SOURCE_NAMESPACE:
      type: string
      default: security
      required: false
      description: "Namespace holding source credentials consumed by ESO."
    RUNTIME_CREDENTIALS_TARGET_NAMESPACE:
      type: string
      default: apps
      required: false
      description: "Namespace where canonical runtime credential target secrets are materialized."
    RUNTIME_CREDENTIALS_ESO_WAIT_TIMEOUT:
      type: integer
      default: 180
      required: false
      description: "Timeout (seconds) for ESO CRD, ExternalSecret readiness, and target secret verification checks."
    RUNTIME_CREDENTIALS_REQUIRED:
      type: boolean
      default: false
      required: false
      description: "When true, runtime credential reconciliation failures are fail-fast instead of warn-and-skip."

  tech_preferences:
    frontend:
      required:
        - vue_latest_stable
        - vue_router_latest_stable
        - pinia
        - onyx_design_system
    backend:
      allowed_primary_stacks:
        - go_plus_gin
        - kotlin_plus_ktor
        - python_plus_fastapi_pydantic_v2
    workflows:
      required:
        - apache_airflow_taskflow
    testing:
      required:
        - unit_tests
        - integration_tests
        - contract_tests_pact
        - e2e_tests
      preferred_frameworks:
        - vitest
