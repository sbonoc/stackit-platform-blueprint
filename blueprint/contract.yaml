      local_helm_root: infra/local/helm
      argocd_root: infra/gitops/argocd
      dags_root: dags
  script_contract:
    blueprint_managed_roots:
      - scripts/bin/blueprint/
      - scripts/bin/docs/
      - scripts/lib/blueprint/
      - scripts/lib/docs/
      - scripts/lib/infra/
      - scripts/lib/quality/
      - scripts/lib/shell/
      - scripts/bin/infra/
      - scripts/bin/quality/
    platform_editable_roots:
      - scripts/bin/platform/
      - scripts/lib/platform/

  profiles:
    default: local-full
    supported:
      - local-full
      - local-lite
      - stackit-dev
      - stackit-stage
      - stackit-prod
    profile_contract:
      local-full:
        description: "Local Kubernetes stack with Docker Desktop preferred on workstations and optional modules available."
      local-lite:
        description: "Local Kubernetes stack with Docker Desktop preferred on workstations and lighter defaults."
      stackit-dev:
        description: "Managed STACKIT deployment for dev."
      stackit-stage:
        description: "Managed STACKIT deployment for stage."
      stackit-prod:
        description: "Managed STACKIT deployment for prod."

  architecture:
    ddd_clean_architecture_required: true
    logical_boundaries:
      - domain
      - application
      - infrastructure
      - presentation
    dependency_rule: "Outer layers may depend on inner; inner layers never depend on outer."
    airflow_dag_layout:
      dag_entrypoints_root: dags/
      shared_bootstrap_file: dags/_bootstrap.py
      forbid_dag_entrypoints_under: apps/**
      airflowignore_must_restrict_parser_scope: true

  stack_contract:
    local:
      kubernetes: docker-desktop-preferred
      kubernetes_override_env: LOCAL_KUBE_CONTEXT
      ci_kubernetes: kind
      provisioning: crossplane
      deployment: argocd
      secrets: external-secrets-operator
      observability:
        optional_module_id: observability
        default_enabled: false
        allowed_installers:
          - helm
          - crossplane-provider-helm
    stackit:
      provisioning: terraform
      deployment: argocd
      secrets: stackit-secrets-manager-plus-eso
      authn_authz: keycloak
      observability:
        optional_module_id: observability
        default_enabled: false
        managed_service: stackit-observability

  toggles:
    OBSERVABILITY_ENABLED:
      type: boolean
      default: false
      required: true
      description: "Canonical optional-module switch for observability stack and OTEL runtime wiring."
    WORKFLOWS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for STACKIT Workflows (Managed Airflow) provisioning/deployment."
    LANGFUSE_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Langfuse provisioning/deployment."
    POSTGRES_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Postgres provisioning/deployment."
    NEO4J_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Neo4j provisioning/deployment."
    OBJECT_STORAGE_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Object Storage provisioning/deployment."
    RABBITMQ_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for RabbitMQ provisioning/deployment."
    DNS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for DNS provisioning/deployment."
    PUBLIC_ENDPOINTS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Gateway API public edge provisioning/deployment."
    SECRETS_MANAGER_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Secrets Manager provisioning/deployment."
    KMS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for KMS provisioning/deployment."
    IDENTITY_AWARE_PROXY_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional-module switch for Identity-Aware Proxy provisioning/deployment; requires Keycloak OIDC configuration."
    APP_CATALOG_SCAFFOLD_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Opt-in scaffold switch for app catalog artifacts and app test-lane contract checks."
    APP_RUNTIME_GITOPS_ENABLED:
      type: boolean
      default: true
      required: false
      description: "Enable app runtime workload scaffolding under infra/gitops/platform and keep app catalog runtime delivery contract wiring active."
    APP_RUNTIME_MIN_WORKLOADS:
      type: integer
      default: 1
      required: false
      description: "Minimum Deployment/StatefulSet workload objects expected in apps namespace during execute-mode smoke when APP_RUNTIME_GITOPS_ENABLED=true."
    LOCAL_POST_DEPLOY_HOOK_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Enable local-only post-deploy reconciliation hook after successful infra-provision-deploy."
    LOCAL_POST_DEPLOY_HOOK_REQUIRED:
      type: boolean
      default: false
      required: false
      description: "When true, local post-deploy hook failures are fail-fast; when false they are warn-and-continue."
    LOCAL_POST_DEPLOY_HOOK_CMD:
      type: string
      default: "make -C \"$ROOT_DIR\" infra-post-deploy-consumer"
      required: false
      description: "Shell command invoked by local post-deploy hook contract when enabled."
    EVENT_MESSAGING_BASELINE_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional contract switch for canonical async event envelope, versioning policy, and reliability guidance."
    ZERO_DOWNTIME_EVOLUTION_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional contract switch for expand/migrate/contract rollout policy checks across schema/API/event changes."
    TENANT_CONTEXT_PROPAGATION_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Optional contract switch for tenant/organization context propagation across identity, HTTP, async events, and telemetry."
    KEYCLOAK_OPTIONAL_MODULE_RECONCILIATION_ENABLED:
      type: boolean
      default: true
      required: false
      description: "Feature toggle for optional-module Keycloak realm/client/admin reconciliation (for example Workflows/Langfuse)."
    RUNTIME_CREDENTIALS_SOURCE_NAMESPACE:
      type: string
      default: security
      required: false
      description: "Namespace holding source credentials consumed by ESO."
    RUNTIME_CREDENTIALS_TARGET_NAMESPACE:
      type: string
      default: apps
      required: false
      description: "Namespace where canonical runtime credential target secrets are materialized."
    RUNTIME_CREDENTIALS_ESO_WAIT_TIMEOUT:
      type: integer
      default: 180
      required: false
      description: "Timeout (seconds) for ESO CRD, ExternalSecret readiness, and target secret verification checks."
    RUNTIME_CREDENTIALS_REQUIRED:
      type: boolean
      default: false
      required: false
      description: "When true, runtime credential reconciliation failures are fail-fast instead of warn-and-skip."
    ASYNC_PACT_MESSAGE_CONTRACTS_ENABLED:
      type: boolean
      default: false
      required: false
      description: "Enable opt-in async message-contract producer/consumer Pact lanes."
    ASYNC_PACT_PRODUCER_VERIFY_CMD:
      type: string
      default: ""
      required: false
      description: "Shell command that verifies producer-side async Pact message contracts."
    ASYNC_PACT_CONSUMER_VERIFY_CMD:
      type: string
      default: ""
      required: false
      description: "Shell command that verifies consumer-side async Pact message contracts."
    ASYNC_PACT_BROKER_PUBLISH_CMD:
      type: string
      default: ""
      required: false
      description: "Optional shell command that publishes producer Pact artifacts to a broker."
    ASYNC_PACT_CAN_I_DEPLOY_CMD:
      type: string
      default: ""
      required: false
      description: "Optional shell command that runs can-i-deploy style gate checks after async verification."
    ASYNC_PACT_PRODUCER_ARTIFACT_DIR:
      type: string
      default: artifacts/contracts/async/pact/producer
      required: false
      description: "Producer async Pact artifact output directory."
    ASYNC_PACT_CONSUMER_ARTIFACT_DIR:
      type: string
      default: artifacts/contracts/async/pact/consumer
      required: false
      description: "Consumer async Pact artifact output directory."

  async_message_contracts:
    provider: pact
    enabled_by_default: false
    enabled_env_var: ASYNC_PACT_MESSAGE_CONTRACTS_ENABLED
    canonical_paths:
      producer_contracts_dir: contracts/async/pact/messages/producer
      consumer_contracts_dir: contracts/async/pact/messages/consumer
      producer_seed_readme: contracts/async/pact/messages/producer/README.md
      consumer_seed_readme: contracts/async/pact/messages/consumer/README.md
    wrappers:
      producer: scripts/bin/blueprint/test_async_message_contracts_producer.sh
      consumer: scripts/bin/blueprint/test_async_message_contracts_consumer.sh
      all: scripts/bin/blueprint/test_async_message_contracts_all.sh
    make_targets:
      producer: test-contracts-async-producer
      consumer: test-contracts-async-consumer
      all: test-contracts-async-all
      aggregate: test-contracts-all
    optional_hooks:
      producer_verify_command_env_var: ASYNC_PACT_PRODUCER_VERIFY_CMD
      consumer_verify_command_env_var: ASYNC_PACT_CONSUMER_VERIFY_CMD
      producer_publish_command_env_var: ASYNC_PACT_BROKER_PUBLISH_CMD
      can_i_deploy_command_env_var: ASYNC_PACT_CAN_I_DEPLOY_CMD

  app_catalog_scaffold_contract:
    enabled_by_default: false
    enable_flag: APP_CATALOG_SCAFFOLD_ENABLED
    required_paths_when_enabled:
      - apps/catalog
      - apps/catalog/manifest.yaml
      - apps/catalog/versions.lock
    docs_paths:
      - docs/platform/consumer/quickstart.md
      - docs/platform/consumer/troubleshooting.md
    test_lane_targets:
      - backend-test-unit
      - backend-test-integration
      - backend-test-contracts
      - backend-test-e2e
      - touchpoints-test-unit
      - touchpoints-test-integration
      - touchpoints-test-contracts
      - touchpoints-test-e2e
      - test-unit-all
      - test-integration-all
      - test-contracts-all
      - test-e2e-all-local
      - test-e2e-all-local-full
      - test-e2e-all-local-execute

  app_runtime_gitops_contract:
    enabled_by_default: true
    enable_flag: APP_RUNTIME_GITOPS_ENABLED
    mode: k8s-manifests
    app_catalog_manifest_path: apps/catalog/manifest.yaml
    smoke_guardrails:
      app_namespace: apps
      workload_kinds:
        - Deployment
        - StatefulSet
      minimum_workloads_env: APP_RUNTIME_MIN_WORKLOADS
      minimum_workloads_default: 1
      diagnostics_reason: empty-runtime-workloads
    required_paths_when_enabled:
      - infra/gitops/platform/base/apps
      - infra/gitops/platform/base/apps/kustomization.yaml
      - infra/gitops/platform/base/apps/backend-api-deployment.yaml
      - infra/gitops/platform/base/apps/backend-api-service.yaml
      - infra/gitops/platform/base/apps/touchpoints-web-deployment.yaml
      - infra/gitops/platform/base/apps/touchpoints-web-service.yaml
    workload_kinds_required_when_enabled:
      - Deployment
      - Service
    docs_paths:
      - docs/platform/consumer/quickstart.md
      - docs/platform/consumer/troubleshooting.md

  local_post_deploy_hook_contract:
    enabled_by_default: false
    enable_flag: LOCAL_POST_DEPLOY_HOOK_ENABLED
    command_env_var: LOCAL_POST_DEPLOY_HOOK_CMD
    strict_mode_env_var: LOCAL_POST_DEPLOY_HOOK_REQUIRED
    invocation_target: infra-provision-deploy
    invocation_script: scripts/bin/infra/provision_deploy.sh
    consumer_target: infra-post-deploy-consumer
    run_profiles:
      - local-lite
      - local-full
    required_paths_when_enabled:
      - scripts/bin/infra/provision_deploy.sh
      - scripts/lib/infra/local_post_deploy_hook.sh
      - scripts/lib/infra/schemas/local_post_deploy_hook_state.schema.json
      - make/platform.mk
    state_artifact_path: artifacts/infra/local_post_deploy_hook.env
    docs_paths:
      - docs/platform/consumer/quickstart.md
      - docs/platform/consumer/troubleshooting.md

  tech_preferences:
    frontend:
      required:
        - vue_latest_stable
        - vue_router_latest_stable
        - pinia
        - onyx_design_system
    backend:
      allowed_primary_stacks:
        - go_plus_gin
        - kotlin_plus_ktor
        - python_plus_fastapi_pydantic_v2
    workflows:
      required:
        - apache_airflow_taskflow
    testing:
      required:
        - unit_tests
        - integration_tests
        - contract_tests_pact
        - e2e_tests
      preferred_frameworks:
        - vitest
        - playwright
        - pact
        - pytest

  docs_contract:
    source_format: markdown
    site_generator: docusaurus
    must_support_mermaid: true
    required_diagrams:
      - docs/blueprint/architecture/system_overview.md
    docs_storytelling_required: true
    edit_link_enabled: true
    blueprint_docs:
      root: docs/blueprint
      sync_policy: strict_template_sync
    platform_docs:
      root: docs/platform
      seed_mode: create_if_missing
      bootstrap_command: make blueprint-bootstrap
      template_root: scripts/templates/blueprint/bootstrap/docs/platform
      required_seed_files:
        - docs/platform/consumer/first_30_minutes.md
        - docs/platform/README.md
        - docs/platform/consumer/quickstart.md
        - docs/platform/consumer/endpoint_exposure_model.md
        - docs/platform/consumer/protected_api_routes.md
        - docs/platform/consumer/event_messaging_baseline.md
        - docs/platform/consumer/zero_downtime_evolution.md
        - docs/platform/consumer/tenant_context_propagation.md
        - docs/platform/consumer/runtime_credentials_eso.md
        - docs/platform/consumer/troubleshooting.md
        - docs/platform/modules/observability/README.md
        - docs/platform/modules/workflows/README.md
        - docs/platform/modules/langfuse/README.md
        - docs/platform/modules/postgres/README.md
        - docs/platform/modules/neo4j/README.md
        - docs/platform/modules/object-storage/README.md
        - docs/platform/modules/rabbitmq/README.md
        - docs/platform/modules/dns/README.md
        - docs/platform/modules/public-endpoints/README.md
        - docs/platform/modules/secrets-manager/README.md
        - docs/platform/modules/kms/README.md
        - docs/platform/modules/identity-aware-proxy/README.md

  make_contract:
    required_namespaces:
      - blueprint-
      - quality-
      - infra-
      - apps-
      - backend-
      - touchpoints-
      - test-
      - auth-
      - docs-
    required_targets:
      - help
      - blueprint-init-repo
      - blueprint-init-repo-interactive
      - blueprint-resync-consumer-seeds
      - blueprint-upgrade-consumer
      - blueprint-upgrade-consumer-preflight
      - blueprint-upgrade-consumer-validate
      - blueprint-upgrade-readiness-doctor
