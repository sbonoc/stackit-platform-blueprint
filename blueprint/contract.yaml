apiVersion: blueprint.contract/v1alpha1
kind: PlatformBlueprintContract
metadata:
  name: stackit-k8s-reusable-blueprint
  version: 1.0.0
spec:
  repository:
    repo_mode: template-source
    allowed_repo_modes:
      - template-source
      - generated-consumer
    default_branch: main
    branch_naming:
      model: github-flow
      purpose_prefixes:
        - feature/
        - fix/
        - hotfix/
        - chore/
        - docs/
        - refactor/
        - test/
        - ci/
        - codex/
        - copilot/
    template_bootstrap:
      model: github-template
      template_version: 1.0.0
      init_command: make blueprint-init-repo
      defaults_env_file: blueprint/repo.init.env
      secrets_example_env_file: blueprint/repo.init.secrets.example.env
      secrets_env_file: blueprint/repo.init.secrets.env
      force_env_var: BLUEPRINT_INIT_FORCE
      required_inputs:
        - BLUEPRINT_REPO_NAME
        - BLUEPRINT_GITHUB_ORG
        - BLUEPRINT_GITHUB_REPO
        - BLUEPRINT_DEFAULT_BRANCH
        - BLUEPRINT_STACKIT_REGION
        - BLUEPRINT_STACKIT_TENANT_SLUG
        - BLUEPRINT_STACKIT_PLATFORM_SLUG
        - BLUEPRINT_STACKIT_PROJECT_ID
        - BLUEPRINT_STACKIT_TFSTATE_BUCKET
        - BLUEPRINT_STACKIT_TFSTATE_KEY_PREFIX
    required_files:
      - .github/actions/prepare-blueprint-ci/action.yml
      - .github/CODEOWNERS
      - .github/ISSUE_TEMPLATE/bug_report.yml
      - .github/ISSUE_TEMPLATE/feature_request.yml
      - .github/ISSUE_TEMPLATE/config.yml
