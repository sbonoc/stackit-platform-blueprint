      - blueprint-render-module-wrapper-skeletons
      - quality-hooks-fast
      - quality-hooks-strict
      - quality-hooks-run
      - quality-root-dir-prelude-check
      - quality-infra-shell-source-graph-check
      - quality-runtime-contract-drift-report
      - quality-ci-sync
      - quality-ci-check-sync
      - quality-docs-lint
      - quality-docs-sync-all
      - quality-docs-sync-blueprint-template
      - quality-docs-check-blueprint-template-sync
      - quality-docs-sync-platform-seed
      - quality-docs-check-platform-seed-sync
      - quality-docs-sync-core-targets
      - quality-docs-check-core-targets-sync
      - quality-docs-sync-contract-metadata
      - quality-docs-check-contract-metadata-sync
      - quality-docs-sync-runtime-identity-summary
      - quality-docs-check-runtime-identity-summary-sync
      - quality-docs-sync-module-contract-summaries
      - quality-docs-check-module-contract-summaries-sync
      - quality-test-pyramid
      - infra-prereqs
      - infra-help-reference
      - infra-contract-test-fast
      - infra-bootstrap
      - infra-local-destroy-all
      - infra-destroy-disabled-modules
      - infra-validate
      - infra-smoke
      - infra-provision
      - infra-deploy
      - infra-provision-deploy
      - infra-post-deploy-consumer
      - infra-stackit-bootstrap-preflight
      - infra-stackit-bootstrap-plan
      - infra-stackit-bootstrap-apply
      - infra-stackit-bootstrap-destroy
      - infra-stackit-foundation-preflight
      - infra-stackit-foundation-plan
      - infra-stackit-foundation-apply
      - infra-stackit-foundation-destroy
      - infra-stackit-foundation-fetch-kubeconfig
      - infra-stackit-foundation-refresh-kubeconfig
      - infra-stackit-foundation-seed-runtime-secret
      - infra-stackit-ci-github-setup
      - infra-stackit-destroy-all
      - infra-runtime-inventory
      - infra-local-runtime-inventory
      - infra-stackit-runtime-prerequisites
      - infra-stackit-runtime-inventory
      - infra-stackit-runtime-deploy
      - infra-stackit-smoke-foundation
      - infra-stackit-smoke-runtime
      - infra-stackit-provision-deploy
      - infra-argocd-topology-render
      - infra-argocd-topology-validate
      - infra-doctor
      - infra-context
      - infra-status
      - infra-status-json
      - infra-audit-version
      - infra-audit-version-cached
      - apps-bootstrap
      - apps-ci-bootstrap
      - apps-ci-bootstrap-consumer
      - apps-smoke
      - apps-audit-versions
      - apps-audit-versions-cached
      - apps-publish-ghcr
      - quality-ci-fast
      - quality-ci-slow-integration
      - quality-ci-full-e2e
      - quality-ci-strict
      - quality-ci-blueprint
      - quality-ci-generated-consumer-smoke
      - auth-reconcile-eso-runtime-secrets
      - auth-reconcile-argocd-repo-credentials
      - auth-reconcile-runtime-identity
      - backend-test-unit
      - backend-test-integration
      - backend-test-contracts
      - backend-test-e2e
      - touchpoints-test-unit
      - touchpoints-test-integration
      - touchpoints-test-contracts
      - touchpoints-test-e2e
      - test-unit-all
      - test-integration-all
      - test-contracts-async-producer
      - test-contracts-async-consumer
      - test-contracts-async-all
      - test-contracts-all
      - test-e2e-all-local
      - test-e2e-all-local-full
      - test-e2e-all-local-execute
      - docs-install
      - docs-run
      - docs-build
      - docs-smoke
    ownership:
      root_loader_file: Makefile
      blueprint_generated_file: make/blueprint.generated.mk
      platform_editable_file: make/platform.mk
      platform_editable_include_dir: make/platform
      platform_seed_mode: create_if_missing
    optional_target_materialization:
      mode: conditional
      source_template: scripts/templates/blueprint/bootstrap/make/blueprint.generated.mk.tmpl
      output_file: make/blueprint.generated.mk
      materialization_command: make blueprint-render-makefile

  versioning:
    latest_stable_required: true
    pin_all_versions: true
    semver_drift_policy:
      patch_drift: fail
      minor_drift: warn
      major_drift: fail
      non_semver: warn

  security_contract:
    secret_management:
      - no_plaintext_secrets_in_git
      - use_eso_for_k8s_secret_materialization
    logging:
      structured_logs_required: true
      pii_or_secret_leakage_forbidden: true
    oidc:
      keycloak_supported: true

  observability_contract:
    required_telemetry_types:
      - metrics
      - logs
      - traces
    required_signal_propagation:
      - trace_id_end_to_end
    required_runtime_checks:
      - collector_health
      - metrics_ingestion
      - logs_ingestion
      - traces_ingestion

  event_messaging_contract:
    enabled_by_default: false
    enable_flag: EVENT_MESSAGING_BASELINE_ENABLED
    envelope:
      required_fields:
        - event_id
        - event_type
        - event_version
        - occurred_at
        - producer_service
        - correlation_id
        - causation_id
        - traceparent
        - tenant_id
        - organization_id
        - payload
      optional_fields:
        - metadata
    versioning_policy:
      additive_evolution_default: true
      deprecation_window_releases: 2
      overlap_window_releases: 2
      dual_publish_required_for_breaking: true
      dual_read_required_for_breaking: true
    reliability:
      outbox:
        contract_required: true
      inbox:
        contract_required: true
      idempotency:
        contract_required: true
        key_fields:
          - event_id
          - consumer_name
      retry:
        strategy: exponential-backoff-with-jitter
      dead_letter_queue:
        naming_pattern: "<event_type>.dlq"
        replay_contract_required: true
    scaffolding_hooks:
      producer_contract_dir: scripts/templates/consumer/scaffold/messaging/contracts/producer
      consumer_contract_dir: scripts/templates/consumer/scaffold/messaging/contracts/consumer
      outbox_template_path: scripts/templates/consumer/scaffold/messaging/sql/outbox.sql.tmpl
      inbox_template_path: scripts/templates/consumer/scaffold/messaging/sql/inbox.sql.tmpl
      idempotency_template_path: scripts/templates/consumer/scaffold/messaging/sql/idempotency_keys.sql.tmpl

  zero_downtime_evolution_contract:
    enabled_by_default: false
    enable_flag: ZERO_DOWNTIME_EVOLUTION_ENABLED
    lifecycle:
      phases:
        - expand
        - migrate
        - contract
      destructive_changes_only_in_contract_phase: true
      minimum_stable_release_windows: 1
    database_policy:
      backward_compatible_expand_first: true
      rollback_checkpoint_required: true
      destructive_migrations_require_feature_flag: true
    api_policy:
      additive_changes_default: true
      mixed_version_compatibility_required: true
      removal_deprecation_window_releases: 2
    event_policy:
      additive_evolution_default: true
      producer_consumer_overlap_releases: 2
      dual_read_required_for_breaking: true
    quality_checks:
      reject_drop_column_without_contract_marker: true
      reject_drop_table_without_contract_marker: true
      reject_event_version_overwrite_without_new_version: true

  tenant_context_contract:
    enabled_by_default: false
    enable_flag: TENANT_CONTEXT_PROPAGATION_ENABLED
    required_for_user_initiated_flows: true
    identity:
      required_claims:
        - tenant_id
        - organization_id
        - user_id
      optional_claims:
        - tenant_role
    http_api:
      required_headers:
        tenant_id: X-Tenant-ID
        organization_id: X-Organization-ID
        correlation_id: X-Correlation-ID
      missing_context_http_status: 400
    async_events:
      required_fields:
        - tenant_id
        - organization_id
        - correlation_id
        - causation_id
      allow_empty_tenant_for_system_events: true
    observability:
      log_fields:
        - tenant_id
        - organization_id
        - correlation_id
        - trace_id
      trace_attributes:
        - tenant.id
        - organization.id
        - correlation.id
      audit_fields:
        - tenant_id
        - organization_id
        - actor_id
        - action
        - outcome

  optional_modules:
    root: blueprint/modules
    disabled_scaffold_policy:
      mode: preserve_on_bootstrap
      disabled_resource_cleanup_command: make infra-destroy-disabled-modules
      command: make infra-bootstrap
    modules:
      observability:
        enabled_by_default: false
        enable_flag: OBSERVABILITY_ENABLED
        contract_path: blueprint/modules/observability/module.contract.yaml
        terraform_path: infra/cloud/stackit/terraform/modules/observability
        helm_path: infra/local/helm/observability
        gitops_path: infra/gitops/argocd/optional/${ENV}/observability.yaml
        docs_path: docs/platform/modules/observability/README.md
        tests_path: tests/infra/modules/observability
        make_targets_mode: conditional
        make_targets:
          - infra-observability-plan
          - infra-observability-apply
          - infra-observability-deploy
          - infra-observability-smoke
          - infra-observability-destroy
      workflows:
        enabled_by_default: false
        enable_flag: WORKFLOWS_ENABLED
        scaffolding_mode: conditional
        paths_required_when_enabled:
          - dags_path
          - terraform_path
