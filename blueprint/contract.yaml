apiVersion: blueprint.contract/v1alpha1
kind: PlatformBlueprintContract
metadata:
  name: stackit-k8s-reusable-blueprint
  version: 1.0.0
spec:
  repository:
    repo_mode: template-source
    allowed_repo_modes:
      - template-source
      - generated-consumer
    default_branch: main
    branch_naming:
      model: github-flow
      purpose_prefixes:
        - feature/
        - fix/
        - hotfix/
        - chore/
        - docs/
        - refactor/
        - test/
        - ci/
        - codex/
        - copilot/
    template_bootstrap:
      model: github-template
      template_version: 1.0.0
      init_command: make blueprint-init-repo
      defaults_env_file: blueprint/repo.init.env
      secrets_example_env_file: blueprint/repo.init.secrets.example.env
      secrets_env_file: blueprint/repo.init.secrets.env
      force_env_var: BLUEPRINT_INIT_FORCE
      required_inputs:
        - BLUEPRINT_REPO_NAME
        - BLUEPRINT_GITHUB_ORG
        - BLUEPRINT_GITHUB_REPO
        - BLUEPRINT_DEFAULT_BRANCH
        - BLUEPRINT_STACKIT_REGION
        - BLUEPRINT_STACKIT_TENANT_SLUG
        - BLUEPRINT_STACKIT_PLATFORM_SLUG
        - BLUEPRINT_STACKIT_PROJECT_ID
        - BLUEPRINT_STACKIT_TFSTATE_BUCKET
        - BLUEPRINT_STACKIT_TFSTATE_KEY_PREFIX
    required_files:
      - .github/actions/prepare-blueprint-ci/action.yml
      - .github/CODEOWNERS
      - .github/ISSUE_TEMPLATE/bug_report.yml
      - .github/ISSUE_TEMPLATE/feature_request.yml
      - .github/ISSUE_TEMPLATE/config.yml
      - .github/pull_request_template.md
      - .github/workflows/ci.yml
      - .gitignore
      - .dockerignore
      - .editorconfig
      - .pre-commit-config.yaml
      - README.md
      - AGENTS.md
      - AGENTS.backlog.md
      - AGENTS.decisions.md
      - Makefile
      - make/blueprint.generated.mk
      - make/platform.mk
      - make/platform/.gitkeep
      - scripts/bin/blueprint/bootstrap.sh
      - scripts/bin/blueprint/clean_generated.sh
      - scripts/bin/blueprint/init_repo_interactive.sh
      - scripts/bin/blueprint/resync_consumer_seeds.sh
      - scripts/bin/blueprint/upgrade_consumer.sh
      - scripts/bin/blueprint/upgrade_consumer_validate.sh
      - scripts/bin/blueprint/render_module_wrapper_skeletons.sh
      - scripts/bin/blueprint/render_makefile.sh
      - scripts/bin/blueprint/validate_contract.py
      - scripts/bin/infra/destroy_disabled_modules.sh
      - scripts/bin/infra/local_crossplane_bootstrap.sh
      - scripts/bin/infra/local_destroy_all.sh
      - scripts/bin/infra/core_runtime_bootstrap.sh
      - scripts/bin/infra/core_runtime_smoke.sh
      - scripts/bin/infra/stackit_workflows_keycloak_reconcile.sh
      - scripts/bin/infra/langfuse_keycloak_reconcile.sh
      - scripts/bin/infra/public_endpoints_deploy.sh
      - scripts/bin/infra/identity_aware_proxy_deploy.sh
      - scripts/bin/infra/stackit_foundation_seed_runtime_secret.sh
      - scripts/bin/infra/workload_health_check.py
      - scripts/bin/quality/check_test_pyramid.py
      - scripts/bin/quality/hooks_fast.sh
      - scripts/bin/quality/lint_docs.py
      - scripts/bin/quality/hooks_run.sh
      - scripts/bin/quality/hooks_strict.sh
      - scripts/bin/quality/render_core_targets_doc.py
      - scripts/lib/blueprint/contract_schema.py
