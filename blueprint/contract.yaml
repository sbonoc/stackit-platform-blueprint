      - infra/gitops/platform/environments/dev/kustomization.yaml
      - infra/gitops/platform/environments/dev/runtime-contract-configmap.yaml
      - infra/gitops/argocd/overlays/dev/appproject.yaml
      - infra/gitops/argocd/overlays/dev/applicationset-platform-environments.yaml
      - infra/local/helm/core/argocd.values.yaml
      - infra/local/helm/core/external-secrets.values.yaml
      - infra/local/helm/core/cert-manager.values.yaml
      - infra/local/helm/core/crossplane.values.yaml
      - scripts/templates/infra/bootstrap/infra/cloud/stackit/terraform/bootstrap/versions.tf
      - scripts/templates/infra/bootstrap/infra/cloud/stackit/terraform/foundation/versions.tf
      - scripts/templates/infra/bootstrap/infra/gitops/argocd/root/kustomization.yaml
      - scripts/templates/infra/bootstrap/infra/gitops/argocd/root/applicationset-platform-environments.yaml
      - scripts/templates/infra/bootstrap/infra/gitops/argocd/environments/dev/platform-application.yaml
      - scripts/templates/infra/bootstrap/infra/gitops/argocd/core/keycloak.application.yaml.tmpl
      - scripts/templates/infra/bootstrap/infra/gitops/argocd/overlays/local/appproject.yaml
