apiVersion: blueprint.module.contract/v1alpha1
kind: OptionalModuleContract
metadata:
  name: neo4j
  version: 1.0.0
spec:
  module_id: neo4j
  purpose: "Deploy Neo4j graph database and publish canonical runtime connection contract."
  enabled_by_default: false
  enable_flag: NEO4J_ENABLED

  paths:
    terraform: infra/cloud/stackit/terraform/modules/neo4j
    helm: infra/local/helm/neo4j/values.yaml
    gitops: infra/gitops/argocd/optional/${ENV}/neo4j.yaml
    docs: docs/platform/modules/neo4j/README.md
    tests: tests/infra/modules/neo4j

  dependencies:
    required_core_capabilities:
      - argocd_available
      - persistent_storage_available

  inputs:
    required_env:
      - NEO4J_AUTH_USERNAME
      - NEO4J_AUTH_PASSWORD
    optional_env:
      - NEO4J_EDITION
      - NEO4J_CPU_REQUEST
      - NEO4J_MEMORY_REQUEST
      - NEO4J_STORAGE_SIZE
      - NEO4J_BOLT_PORT
      - NEO4J_HTTP_PORT
    defaults:
      NEO4J_EDITION: community
      NEO4J_BOLT_PORT: 7687
      NEO4J_HTTP_PORT: 7474

  outputs:
    produced:
      - NEO4J_URI
      - NEO4J_USERNAME
      - NEO4J_PASSWORD
      - NEO4J_DATABASE

  make_targets:
    plan: infra-neo4j-plan
    apply: infra-neo4j-apply
    deploy: infra-neo4j-deploy
    smoke: infra-neo4j-smoke
    destroy: infra-neo4j-destroy

  smoke_checks:
    - "neo4j pod ready"
    - "bolt connectivity check"
    - "cypher read/write sanity"

  failure_modes:
    - code: NEO4J_DNS_UNRESOLVED
      symptom: "host cannot be resolved from dependent workload"
      likely_root_cause: "wrong service host or namespace"
    - code: NEO4J_AUTH_FAILED
      symptom: "invalid auth token/credentials"
      likely_root_cause: "secret mismatch"

  cleanup_contract:
    destroy_target: infra-neo4j-destroy
