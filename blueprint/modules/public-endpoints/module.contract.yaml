apiVersion: blueprint.module.contract/v1alpha1
kind: OptionalModuleContract
metadata:
  name: public-endpoints
  version: 1.0.0
spec:
  module_id: public-endpoints
  purpose: "Provision Gateway API public edge baseline for marketplace UI and API surfaces."
  enabled_by_default: false
  enable_flag: PUBLIC_ENDPOINTS_ENABLED

  paths:
    terraform: infra/cloud/stackit/terraform/modules/public-endpoints
    helm: infra/local/helm/public-endpoints/values.yaml
    gitops: infra/gitops/argocd/optional/${ENV}/public-endpoints.yaml
    docs: docs/platform/modules/public-endpoints/README.md
    tests: tests/infra/modules/public-endpoints

  dependencies:
    required_core_capabilities:
      - load_balancer_available
    optional_module_dependencies:
      - dns

  inputs:
    required_env:
      - PUBLIC_ENDPOINTS_BASE_DOMAIN
    optional_env:
      - PUBLIC_ENDPOINTS_NAMESPACE
      - PUBLIC_ENDPOINTS_CONTROLLER_NAMESPACE
      - PUBLIC_ENDPOINTS_GATEWAY_NAME
      - PUBLIC_ENDPOINTS_GATEWAY_CLASS_NAME
      - PUBLIC_ENDPOINTS_HELM_RELEASE
      - PUBLIC_ENDPOINTS_HELM_CHART
      - PUBLIC_ENDPOINTS_HELM_CHART_VERSION

  outputs:
    produced:
      - PUBLIC_ENDPOINTS_BASE_DOMAIN
      - PUBLIC_ENDPOINTS_GATEWAY_NAME
      - PUBLIC_ENDPOINTS_GATEWAY_CLASS_NAME
      - PUBLIC_ENDPOINTS_NAMESPACE

  make_targets:
    plan: infra-public-endpoints-plan
    apply: infra-public-endpoints-apply
    deploy: infra-public-endpoints-deploy
    smoke: infra-public-endpoints-smoke
    destroy: infra-public-endpoints-destroy

  smoke_checks:
    - "Base domain contract is present"
    - "Shared Gateway API baseline contract is present"

  cleanup_contract:
    destroy_target: infra-public-endpoints-destroy
