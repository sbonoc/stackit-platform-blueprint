fullnameOverride: "blueprint-opensearch"
image:
  registry: "docker.io"
  repository: "bitnamilegacy/opensearch"
  tag: "2.17.1-debian-12-r0"
security:
  enabled: true
  adminPassword: "admin"
master:
  replicaCount: 1
  heapSize: 512m
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  persistence:
    enabled: false
extraEnvVars:
  - name: OPENSEARCH_USERNAME
    value: "admin"
