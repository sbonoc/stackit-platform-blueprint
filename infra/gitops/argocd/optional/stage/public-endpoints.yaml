apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-public-endpoints-stage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-blueprint
    app.kubernetes.io/component: optional-module
    app.kubernetes.io/name: public-endpoints
    app.kubernetes.io/environment: stage
spec:
  project: platform-edge-stage
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  source:
    repoURL: docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: 1.7.1
    helm:
      releaseName: blueprint-public-endpoints
      values: |
        config:
          envoyGateway:
            logging:
              level:
                default: info
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
