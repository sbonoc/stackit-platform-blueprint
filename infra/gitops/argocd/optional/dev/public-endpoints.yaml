apiVersion: v1
kind: List
items:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: platform-public-endpoints-dev
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: platform-blueprint
        app.kubernetes.io/component: optional-module
        app.kubernetes.io/name: public-endpoints
        app.kubernetes.io/environment: dev
    spec:
      project: platform-edge-dev
      destination:
        server: https://kubernetes.default.svc
        namespace: envoy-gateway-system
      source:
        repoURL: docker.io/envoyproxy
        chart: gateway-helm
        targetRevision: 1.7.1
        helm:
          releaseName: blueprint-public-endpoints
          values: |
            config:
              envoyGateway:
                logging:
                  level:
                    default: info
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
  - apiVersion: gateway.networking.k8s.io/v1
    kind: GatewayClass
    metadata:
      name: public-endpoints
    spec:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: public-endpoints
      namespace: network
      labels:
        app.kubernetes.io/part-of: platform-blueprint
        app.kubernetes.io/component: public-endpoints
    spec:
      gatewayClassName: public-endpoints
      listeners:
        # Routes attach from multiple platform namespaces, so the shared edge
        # listener must allow cross-namespace HTTPRoute attachment.
        - name: http
          protocol: HTTP
          port: 80
          allowedRoutes:
            namespaces:
              from: All
