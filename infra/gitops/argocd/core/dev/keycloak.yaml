apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-keycloak-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform-blueprint
    app.kubernetes.io/component: authn-authz
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/environment: dev
spec:
  project: platform-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  source:
    repoURL: https://codecentric.github.io/helm-charts
    chart: keycloakx
    targetRevision: 7.1.9
    helm:
      releaseName: keycloak
      values: |
        image:
          repository: quay.io/keycloak/keycloak
          tag: "26.5.5"
          pullPolicy: IfNotPresent
        args:
          - start
        proxy:
          enabled: true
          mode: xforwarded
          http:
            enabled: true
        http:
          relativePath: "/"
        service:
          type: ClusterIP
          httpPort: 80
        extraEnv: |
          - name: KC_DB_URL_HOST
            valueFrom:
              secretKeyRef:
                name: keycloak-runtime-credentials
                key: KEYCLOAK_DATABASE_HOST
          - name: KC_DB_URL_PORT
            valueFrom:
              secretKeyRef:
                name: keycloak-runtime-credentials
                key: KEYCLOAK_DATABASE_PORT
          - name: KC_DB_URL_DATABASE
            valueFrom:
              secretKeyRef:
                name: keycloak-runtime-credentials
                key: KEYCLOAK_DATABASE_NAME
          - name: KC_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: keycloak-runtime-credentials
                key: KEYCLOAK_DATABASE_USERNAME
          - name: KC_BOOTSTRAP_ADMIN_USERNAME
            value: "admin"
          - name: KC_BOOTSTRAP_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-runtime-credentials
                key: KEYCLOAK_ADMIN_PASSWORD
          - name: KC_HOSTNAME
            value: "auth.example.invalid"
          - name: KC_PROXY_HEADERS
            value: "xforwarded"
          - name: KC_HOSTNAME_STRICT
            value: "false"
        database:
          vendor: postgres
          hostname: ""
          port: ""
          database: ""
          username: ""
          existingSecret: keycloak-runtime-credentials
          existingSecretKey: KEYCLOAK_DATABASE_PASSWORD
        extraManifests:
          - |
            apiVersion: cert-manager.io/v1
            kind: Issuer
            metadata:
              name: keycloak-acme
              namespace: security
            spec:
              acme:
                email: "noreply@example.invalid"
                server: "https://acme-v02.api.letsencrypt.org/directory"
                privateKeySecretRef:
                  name: keycloak-acme-account-key
                solvers:
                  - http01:
                      gatewayHTTPRoute:
                        parentRefs:
                          - name: keycloak
                            namespace: security
                            kind: Gateway
          - |
            apiVersion: cert-manager.io/v1
            kind: Certificate
            metadata:
              name: keycloak-tls
              namespace: security
            spec:
              secretName: keycloak-tls
              commonName: "auth.example.invalid"
              dnsNames:
                - "auth.example.invalid"
              issuerRef:
                kind: Issuer
                name: keycloak-acme
          - |
            apiVersion: gateway.networking.k8s.io/v1
            kind: Gateway
            metadata:
              name: keycloak
              namespace: security
              annotations:
                external-dns.alpha.kubernetes.io/hostname: "auth.example.invalid"
            spec:
              gatewayClassName: public-endpoints
              listeners:
                - name: http
                  protocol: HTTP
                  port: 80
                  hostname: "auth.example.invalid"
                  allowedRoutes:
                    namespaces:
                      from: Same
                - name: https
                  protocol: HTTPS
                  port: 443
                  hostname: "auth.example.invalid"
                  tls:
                    mode: Terminate
                    certificateRefs:
                      - name: keycloak-tls
                  allowedRoutes:
                    namespaces:
                      from: Same
          - |
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: keycloak
              namespace: security
            spec:
              parentRefs:
                - name: keycloak
                  namespace: security
              hostnames:
                - "auth.example.invalid"
              rules:
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - name: keycloak-http
                      port: 80
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
