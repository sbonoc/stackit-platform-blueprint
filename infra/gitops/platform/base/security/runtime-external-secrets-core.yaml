apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runtime-credentials
  namespace: apps
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: runtime-credentials-source-store
  target:
    name: runtime-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/part-of: platform-blueprint
          app.kubernetes.io/component: runtime-credentials
  data:
    - secretKey: username
      remoteRef:
        key: runtime-credentials-source
        property: username
    - secretKey: password
      remoteRef:
        key: runtime-credentials-source
        property: password
---
